services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    ports:
      - "3002:3001"
      - "6099:6099"
    environment:
      - NAPCAT_GID=0
      - NAPCAT_UID=0
      - WEBUI_TOKEN=napcat2026
      - MESSAGE_POST_FORMAT=string
    volumes:
      - ./config:/app/napcat/config
      - ./qq_data:/app/.config/QQ
